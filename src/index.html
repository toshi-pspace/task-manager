<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <title>Task Manager</title>
  <style>
    :root {
      --bg: #eef1f6;
      --card: #ffffff;
      --text: #1f2329;
      --muted: #8a909a;
      --accent: #4f7cff;
      --accent-hover: #3d68f0;
      --border: #e4e7ec;
      --danger: #e5484d;
    }

    * { box-sizing: border-box; }

    html { color-scheme: light; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 48px 16px;
    }

    .app {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 4px;
      font-size: 1.6rem;
      color: var(--text);
    }
    .subtitle { margin: 0 0 22px; color: var(--muted); font-size: 0.9rem; }

    .new-task { display: flex; gap: 8px; margin-bottom: 22px; }

    .new-task input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: #fff;
    }
    .new-task input::placeholder { color: var(--muted); }
    .new-task input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.18);
    }

    .new-task button {
      padding: 0 20px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .new-task button:hover { background: var(--accent-hover); }

    .task-list { list-style: none; margin: 0; padding: 0; }

    .task {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 4px;
      border-bottom: 1px solid var(--border);
    }
    .task:last-child { border-bottom: none; }

    .task input[type="checkbox"] {
      width: 19px; height: 19px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .task span {
      flex: 1;
      font-size: 0.97rem;
      color: var(--text);
      word-break: break-word;
    }
    .task.done span { color: var(--muted); text-decoration: line-through; }

    .task .delete {
      border: none;
      background: none;
      color: var(--muted);
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.15s ease;
    }
    .task .delete:hover { color: var(--danger); }

    .bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .link {
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: underline;
      padding: 0;
    }
    .link:hover { color: var(--text); }

    .empty { text-align: center; color: var(--muted); padding: 28px 0; font-size: 0.95rem; }
  </style>
</head>
<body>
  <main class="app">
    <h1>My Tasks</h1>
    <p class="subtitle">A simple to-do list. Your tasks are saved automatically.</p>

    <form id="new-task-form" class="new-task">
      <input
        id="new-task-input"
        type="text"
        placeholder="What needs doing?"
        autocomplete="off"
        required
      />
      <button type="submit">Add</button>
    </form>

    <ul id="task-list" class="task-list"></ul>

    <footer class="bar">
      <span id="count">0 tasks</span>
      <button id="clear-done" class="link">Clear completed</button>
    </footer>
  </main>

  <script>
    // Tasks persist in the browser via localStorage. Each: { id, text, done }.
    const STORAGE_KEY = "task-manager.tasks";

    const form = document.getElementById("new-task-form");
    const input = document.getElementById("new-task-input");
    const list = document.getElementById("task-list");
    const count = document.getElementById("count");
    const clearDone = document.getElementById("clear-done");

    let tasks = load();

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
      catch { /* storage may be unavailable in some sandboxes; app still works in-session */ }
    }

    function render() {
      list.innerHTML = "";

      if (tasks.length === 0) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = "Nothing yet — add your first task above.";
        list.appendChild(li);
      }

      for (const task of tasks) {
        const li = document.createElement("li");
        li.className = "task" + (task.done ? " done" : "");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.done;
        checkbox.addEventListener("change", () => toggle(task.id));

        const span = document.createElement("span");
        span.textContent = task.text;

        const del = document.createElement("button");
        del.className = "delete";
        del.textContent = "×";
        del.title = "Delete";
        del.setAttribute("aria-label", "Delete task");
        del.addEventListener("click", () => remove(task.id));

        li.append(checkbox, span, del);
        list.appendChild(li);
      }

      const remaining = tasks.filter((t) => !t.done).length;
      count.textContent = tasks.length === 0
        ? "0 tasks"
        : `${remaining} of ${tasks.length} left`;
    }

    function add(text) {
      tasks.push({ id: Date.now(), text: text.trim(), done: false });
      save();
      render();
    }

    function toggle(id) {
      const task = tasks.find((t) => t.id === id);
      if (task) task.done = !task.done;
      save();
      render();
    }

    function remove(id) {
      tasks = tasks.filter((t) => t.id !== id);
      save();
      render();
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (input.value.trim()) {
        add(input.value);
        input.value = "";
        input.focus();
      }
    });

    clearDone.addEventListener("click", () => {
      tasks = tasks.filter((t) => !t.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
